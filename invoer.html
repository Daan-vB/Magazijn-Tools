<style>
  :root{--ink:#10151c;--orange:#e8590c;--blue:#1d4ea0;--bg:#eef1f5;--line:#cdd5df;--ok:#1a7f44}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
  .wrap{height:100vh;height:100dvh;display:flex;flex-direction:column}
  .top{background:var(--ink);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
  .top .cat{font-weight:800;font-size:16px}
  .top .cnt{font-size:13px;color:#9aa7b8}
  .top .home{background:#2a3543;border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600}
  .bar{height:4px;background:#2a3543}
  .bar i{display:block;height:100%;background:var(--orange);transition:width .2s}
  .card{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
  .pic{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--line)}
  .pic .nm{font-size:17px;font-weight:600;line-height:1.3}
  .pic .meta{font-size:13px;color:#5b6673;margin-top:8px;line-height:1.5}
  .pic .meta b{color:var(--ink)}
  label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5b6673;display:block;margin-bottom:6px}
  input{width:100%;border:2px solid var(--line);border-radius:10px;padding:14px;font-size:17px;background:#fff}
  input:focus{outline:none;border-color:var(--blue)}
  .qty-row{display:flex;gap:10px;align-items:stretch}
  .qty-row input{flex:1;text-align:center;font-size:22px;font-weight:700}
  .qbtn{width:54px;border:2px solid var(--line);border-radius:10px;background:#fff;font-size:24px;font-weight:700;color:var(--blue)}
  .qbtn:active{background:#e8edf4}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .quick button{flex:1;min-width:56px;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff;font-size:15px;font-weight:600}
  .quick button:active{background:#e8edf4}
  .nav{padding:14px 18px;display:flex;gap:10px;background:#fff;border-top:1px solid var(--line);padding-bottom:max(14px,env(safe-area-inset-bottom))}
  .nav button{flex:1;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700}
  .back{background:#e8edf4;color:#5b6673;flex:.6}
  .skip{background:#e8edf4;color:#5b6673}
  .next{background:var(--orange);color:#fff;flex:1.6}
  /* menu */
  .menu{flex:1;overflow-y:auto;padding:18px}
  .menu h1{font-size:20px;margin-bottom:4px}
  .menu p{font-size:13px;color:#5b6673;margin-bottom:16px}
  .catbtn{width:100%;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;text-align:left}
  .catbtn .l{font-size:16px;font-weight:700}
  .catbtn .r{display:flex;align-items:center;gap:10px}
  .catbtn .badge{background:var(--bg);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;color:#5b6673}
  .catbtn .progress{font-size:12px;color:var(--ok);font-weight:700}
  .final{flex:1;padding:24px;display:flex;flex-direction:column;gap:14px;justify-content:center;text-align:center}
  .final h2{font-size:22px}
  .review{background:#fff;border-radius:10px;padding:14px;text-align:left;max-height:38vh;overflow-y:auto;font-size:14px}
  .review div{padding:6px 0;border-bottom:1px solid var(--line)}
  .review b{color:var(--orange)}
  .final button{border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;color:#fff;background:var(--blue)}
  .final .exp{background:var(--ok)}
  .hintbox{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px;font-size:13px;color:#9a3412;text-align:left;line-height:1.5}
</style>
</head>

const CATS=Object.keys(DATA);
let cat=null, i=0, out={};
const store={}; // per categorie de ingevulde resultaten bewaren tijdens sessie

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function renderMenu(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="top"><span class="cat">Productinvoer</span><span class="cnt">${CATS.length} categorieën</span></div>
    <div class="menu">
      <h1>Kies een afdeling</h1>
      <p>Tik een categorie om producten in te vullen. Werk per afdeling, exporteer, volgende.</p>
      ${CATS.map(c=>{
        const total=DATA[c].length;
        const done=store[c]?Object.keys(store[c]).length:0;
        return `<button class="catbtn" onclick="openCat('${esc(c)}')">
          <span class="l">${esc(c)}</span>
          <span class="r">${done?`<span class="progress">${done} ✓</span>`:''}<span class="badge">${total}</span></span>
        </button>`;
      }).join('')}
    </div>`;
}
function openCat(c){cat=c;i=0;out=store[c]?{...store[c]}:{};render();}
function home(){store[cat]={...out};renderMenu();}

function render(){
  if(i>=DATA[cat].length)return renderFinal();
  const app=document.getElementById('app');
  const p=DATA[cat][i];
  const saved=out[i]||{};
  const pct=Math.round(i/DATA[cat].length*100);
  const isCm=/per cm|per meter|per strekkende/i.test(p.naam);
  app.innerHTML=`
    <div class="top"><span class="cat">${esc(cat)}</span><button class="home" onclick="home()">Menu</button><span class="cnt">${i+1}/${DATA[cat].length}</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card">
      <div class="pic">
        <div class="nm">${esc(p.naam)}</div>
        <div class="meta">Code: <b>${esc(p.code)}</b><br>Barcode: <b>${esc(p.barcode)}</b> · Voorraad: <b>${p.stock}</b></div>
      </div>
      ${isCm?`<div class="hintbox">Let op: dit product is "per cm/meter". Aantal stuks klopt hier mogelijk niet — overweeg overslaan of lengte in de naam.</div>`:''}
      <div>
        <label>Vloernaam</label>
        <input id="nm" value="${esc(saved.name!=null?saved.name:p.sug)}" autocomplete="off" autocapitalize="words">
      </div>
      <div>
        <label>Aantal stuks</label>
        <div class="qty-row">
          <button class="qbtn" onclick="bump(-1)">–</button>
          <input id="qt" type="number" inputmode="numeric" value="${saved.qty!=null?saved.qty:''}" placeholder="0">
          <button class="qbtn" onclick="bump(1)">+</button>
        </div>
        <div class="quick">${[5,10,20,50,100].map(n=>`<button onclick="setq(${n})">${n}</button>`).join('')}</div>
      </div>
    </div>
    <div class="nav">
      <button class="back" onclick="prev()">←</button>
      <button class="skip" onclick="skip()">Overslaan</button>
      <button class="next" onclick="saveNext()">Opslaan →</button>
    </div>`;
}
function bump(d){const q=document.getElementById('qt');q.value=Math.max(0,(parseInt(q.value)||0)+d);}
function setq(n){document.getElementById('qt').value=n;}
function prev(){if(i>0)i--;render();}
function skip(){delete out[i];i++;render();}
function saveNext(){
  const name=document.getElementById('nm').value.trim();
  const qty=document.getElementById('qt').value.trim();
  if(name&&qty)out[i]={name,qty};else delete out[i];
  i++;render();
}
function renderFinal(){
  store[cat]={...out};
  const app=document.getElementById('app');
  const keys=Object.keys(out);
  const rev=keys.map(k=>`<div><b>${esc(out[k].name)}</b> — ${esc(out[k].qty)} st</div>`).join('')||'<div>Niets ingevuld</div>';
  app.innerHTML=`
    <div class="top"><span class="cat">${esc(cat)}</span><button class="home" onclick="renderMenu()">Menu</button><span class="cnt">klaar</span></div>
    <div class="final">
      <h2>${keys.length} ingevuld in ${esc(cat)}</h2>
      <div class="review">${rev}</div>
      <button class="exp" onclick="exportJSON()">Exporteer ${esc(cat)} JSON</button>
      <button onclick="i=0;render()">Terug naar begin</button>
      <button onclick="renderMenu()" style="background:#5b6673">Andere categorie</button>
    </div>`;
}
function exportJSON(){
  const now=Date.now(),cat2={};
  Object.keys(out).forEach(k=>{
    const p=DATA[cat][k],o=out[k];
    cat2[o.name.toUpperCase()]={name:o.name,ean:p.barcode,qty:o.qty,sub:p.code,used:now};
  });
  const blob=new Blob([JSON.stringify(cat2,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=cat.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-geheugen.json';a.click();
}
renderMenu();
</script>
